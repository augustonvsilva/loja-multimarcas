<!DOCTYPE html>
<html lang="pt-BR">

  <link rel="stylesheet" href="./css/style.css">

<body data-page="adidas">
  <header class="site-header">

      <a class="brand" href="./index.html">
        <div class="brand-mark"><img src="./assets/logo.png" alt="Logo JS Multimarcas Premium"></div>
        <div class="brand-copy">
          <strong>JS Multimarcas Premium</strong>
