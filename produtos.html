<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Multimarcas Premium | Produtos</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body data-page="produtos">
  <header class="site-header">
    <div class="container header-bar">
      <a class="brand" href="./index.html">
        <div class="brand-mark"><img src="./assets/logo.png" alt="Logo JS Multimarcas Premium"></div>
        <div class="brand-copy">
          <strong>JS Multimarcas Premium</strong>
          <span>Catalogo completo</span>
        </div>
      </a>
      <nav class="main-nav">
        <a href="./index.html" data-page-link="home">Home</a>
        <a href="./produtos.html" data-page-link="produtos">Produtos</a>
        <a href="./login.html" data-page-link="login" data-user-status>Entrar</a>
        <a class="nav-pill" href="./carrinho.html" data-page-link="carrinho" data-cart-count>Carrinho (0)</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <!-- Cabecalho da pagina de catalogo -->
    <section class="page-hero">
      <div class="container">
        <div class="page-banner glass-panel reveal">
          <span class="eyebrow">Catalogo</span>
          <h1 class="page-title">Todos os produtos premium em um unico lugar.</h1>
          <p class="page-subtitle">Navegue pelas marcas ou explore o catalogo completo. Os produtos podem ser adicionados ao carrinho em qualquer pagina.</p>
          <div class="catalog-filter-stack">
            <div>
              <span class="eyebrow">Marcas</span>
              <div id="brand-filters" class="filters"></div>
            </div>
            <div>
              <span class="eyebrow">Categorias</span>
              <div id="category-filters" class="filters"></div>
            </div>
            <div class="catalog-tools">
              <div class="field">
                <label for="catalog-search">Buscar produto</label>
                <input class="input" id="catalog-search" type="search" placeholder="Ex: jaqueta, tenis, blazer">
              </div>
              <div class="field">
                <label for="catalog-sort">Ordenar por</label>
                <select class="select" id="catalog-sort">
                  <option value="featured">Destaques primeiro</option>
                  <option value="price-asc">Menor preco</option>
                  <option value="price-desc">Maior preco</option>
                  <option value="name-asc">Nome A-Z</option>
                  <option value="stock-desc">Maior estoque</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="product-grid" data-product-grid="all"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-copy">© <span data-year></span> JS Multimarcas Premium.</div>
  </footer>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/catalog.js"></script>
</body>
</html>
